name: Build Android APK (DinPath AI)

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Select APK Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Grant Execute Permission for Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Configure Environment Secrets (.env)
        run: |
          if [ ! -f ".env" ] && [ -f ".env.example" ]; then
            echo "Creating .env from .env.example..."
            cp .env.example .env
          fi

      - name: Ensure Debug Keystore Exists
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore from base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          elif [ ! -f "debug.keystore" ]; then
            echo "Generating fallback debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Android APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          echo "Building APK with target: $BUILD_TYPE"
          if [ "$BUILD_TYPE" == "release" ]; then
            ./gradlew assembleRelease --stacktrace
          elif [ "$BUILD_TYPE" == "both" ]; then
            ./gradlew assembleDebug assembleRelease --stacktrace
          else
            ./gradlew assembleDebug --stacktrace
          fi

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DinPath-AI-APK-${{ github.run_number }}
          path: |
            app/build/outputs/apk/**/*.apk
            .build-outputs/*.apk
            *.apk
          retention-days: 30

      - name: Create GitHub Release & Attach APK (On Tag Push Only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/**/*.apk
            .build-outputs/*.apk
            *.apk
          generate_release_notes: true
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
